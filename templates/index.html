<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DaVinci Resolve Keywording</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a1a;
      color: #e8e8e8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 48px 16px;
    }

    .card {
      background: #252525;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 32px;
      width: 100%;
      max-width: 520px;
    }

    h1 {
      margin: 0 0 24px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #ccc;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    #refresh-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #3a7bd5;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 9px 18px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 28px;
    }

    #refresh-btn:hover:not(:disabled) { background: #2f68bd; }
    #refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #status-area { min-height: 80px; }

    .label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 6px;
    }

    .clip-name {
      font-size: 1rem;
      font-weight: 600;
      color: #e8e8e8;
      margin-bottom: 20px;
      word-break: break-all;
    }

    .keyword-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .keyword-list li {
      background: #333;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 3px 10px;
      font-size: 0.85rem;
      color: #d0d0d0;
    }

    .no-keywords {
      font-size: 0.875rem;
      color: #666;
      font-style: italic;
    }

    .error-box {
      background: #2e1111;
      border: 1px solid #5a2020;
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 0.875rem;
      color: #f08080;
      line-height: 1.5;
    }

    .idle {
      font-size: 0.875rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Clip Keywords</h1>

    <button id="refresh-btn" onclick="refresh()">
      <span class="spinner" id="spinner"></span>
      <span id="btn-label">Refresh</span>
    </button>

    <div id="status-area">
      <p class="idle">Click Refresh to load the currently selected clip.</p>
    </div>
  </div>

  <script>
    async function refresh() {
      const btn = document.getElementById('refresh-btn');
      const spinner = document.getElementById('spinner');
      const label = document.getElementById('btn-label');
      const area = document.getElementById('status-area');

      btn.disabled = true;
      spinner.style.display = 'block';
      label.textContent = 'Loading…';
      area.innerHTML = '';

      try {
        const res = await fetch('/api/clip');
        const data = await res.json();

        if (!res.ok) {
          area.innerHTML = `<div class="error-box">${escapeHtml(data.error || 'Unknown error')}</div>`;
          return;
        }

        const kwHtml = data.keywords.length
          ? `<ul class="keyword-list">${data.keywords.map(k => `<li>${escapeHtml(k)}</li>`).join('')}</ul>`
          : `<p class="no-keywords">(none)</p>`;

        area.innerHTML = `
          <div class="label">Clip</div>
          <div class="clip-name">${escapeHtml(data.clip)}</div>
          <div class="label">Keywords</div>
          ${kwHtml}
        `;
      } catch (err) {
        area.innerHTML = `<div class="error-box">Could not reach the server. Is it running?</div>`;
      } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
        label.textContent = 'Refresh';
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
