<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DaVinci Resolve Keywording</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a1a;
      color: #e8e8e8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 48px 16px;
    }

    .layout-row {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      width: 100%;
      max-width: 1080px;
    }

    /* Filmstrip + card side-by-side */
    .clip-panel {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      flex-shrink: 0;
    }

    #filmstrip {
      display: none;
      flex-direction: column;
      gap: 0;
      width: 184px; /* 160px image + 12px sprocket gutter each side */
      flex-shrink: 0;
      background: #111;
      border-radius: 6px;
      padding: 6px 0;
      /* Sprocket holes: repeating punched rectangles on left and right edges */
      background-image:
        repeating-linear-gradient(
          to bottom,
          transparent 0px,
          transparent 6px,
          #1a1a1a 6px,
          #1a1a1a 10px,
          transparent 10px,
          transparent 24px
        ),
        repeating-linear-gradient(
          to bottom,
          transparent 0px,
          transparent 6px,
          #1a1a1a 6px,
          #1a1a1a 10px,
          transparent 10px,
          transparent 24px
        );
      background-position: 3px 10px, calc(100% - 3px) 10px;
      background-size: 6px 24px, 6px 24px;
      background-repeat: repeat-y, repeat-y;
    }

    .filmstrip-frame-wrap {
      display: block;
      margin: 3px 12px;
      position: relative;
      z-index: 0;
    }

    .filmstrip-frame {
      width: 160px;
      height: 90px; /* 16:9 */
      object-fit: cover;
      border-radius: 2px;
      background: #222;
      display: block;
      cursor: zoom-in;
      transition: transform 0.15s;
    }

    .filmstrip-frame-wrap:hover .filmstrip-frame {
      transform: scale(2.5) translateX(-40%);
      z-index: 100;
      position: relative;
      box-shadow: 0 4px 24px rgba(0,0,0,0.8);
    }

    .card {
      background: #252525;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 32px;
      width: 100%;
      max-width: 520px;
      flex-shrink: 0;
    }

    /* ── Identity panel ── */
    #identity-panel {
      display: none;
      background: #252525;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 24px;
      width: 300px;
      flex-shrink: 0;
    }

    #identity-panel h2 {
      margin: 0 0 16px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
    }

    .identity-card {
      background: #2e2e2e;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      position: relative;
    }

    .identity-card-split-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: none;
      border: 1px solid #555;
      border-radius: 3px;
      color: #888;
      font-size: 0.7rem;
      padding: 2px 6px;
      cursor: pointer;
      line-height: 1.4;
    }
    .identity-card-split-btn:hover { border-color: #888; color: #ccc; }

    .identity-card-faces {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }

    .identity-card-face {
      width: 64px;
      height: 64px;
      border-radius: 6px;
      object-fit: cover;
      background: #1a1a1a;
      display: block;
    }

    .identity-card-face-placeholder {
      width: 64px;
      height: 64px;
      border-radius: 6px;
      background: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      color: #555;
    }

    .identity-status {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-radius: 3px;
      padding: 2px 6px;
      margin-bottom: 8px;
    }

    .identity-status.known     { background: #1a3a1a; color: #5db87a; }
    .identity-status.low       { background: #3a2e10; color: #c9a84c; }
    .identity-status.unknown   { background: #2e2e2e; color: #777; border: 1px solid #444; }

    .identity-assign-wrap {
      margin-bottom: 8px;
    }

    .identity-assign-input {
      width: 100%;
      background: #1e1e1e;
      color: #e8e8e8;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 5px 8px;
      font-size: 0.8rem;
      font-family: inherit;
    }

    .identity-assign-input:focus {
      outline: none;
      border-color: #3a7bd5;
    }

    .identity-add-kw {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: #aaa;
      cursor: pointer;
    }

    .identity-add-kw input[type="checkbox"] {
      accent-color: #3a7bd5;
    }

    #identity-none {
      font-size: 0.85rem;
      color: #555;
      font-style: italic;
    }

    #identity-apply-btn {
      width: 100%;
      margin-top: 8px;
      background: #3a5a9a;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 9px 16px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      display: none;
    }

    #identity-apply-btn:hover:not(:disabled) { background: #2e4a8a; }
    #identity-apply-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #identity-spinner {
      display: inline-block;
      vertical-align: middle;
      margin-left: 6px;
    }

    h1 {
      margin: 0 0 24px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #ccc;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    #refresh-btn, #save-btn, #prev-btn, #next-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: none;
      border-radius: 6px;
      padding: 9px 18px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    #refresh-btn {
      background: #3a7bd5;
      color: #fff;
    }

    #refresh-btn:hover:not(:disabled) { background: #2f68bd; }
    #refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #save-btn {
      background: #2a7a4a;
      color: #fff;
      display: none;
    }

    #save-btn:hover:not(:disabled) { background: #236040; }
    #save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #prev-btn, #next-btn {
      background: #444;
      color: #ccc;
    }

    #prev-btn:hover:not(:disabled), #next-btn:hover:not(:disabled) { background: #555; }
    #prev-btn:disabled, #next-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #status-area { min-height: 80px; }

    .label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 6px;
    }

    .clip-name {
      font-size: 1rem;
      font-weight: 600;
      color: #e8e8e8;
      margin-bottom: 20px;
      word-break: break-all;
    }

    .keyword-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .keyword-list li {
      background: #333;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 3px 6px 3px 10px;
      font-size: 0.85rem;
      color: #d0d0d0;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .kw-remove {
      background: none;
      border: none;
      color: #777;
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1;
      padding: 0 2px;
      border-radius: 3px;
      transition: color 0.1s, background 0.1s;
    }

    .kw-remove:hover {
      color: #f08080;
      background: rgba(240, 128, 128, 0.12);
    }

    .no-keywords {
      font-size: 0.875rem;
      color: #666;
      font-style: italic;
    }

    .error-box {
      background: #2e1111;
      border: 1px solid #5a2020;
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 0.875rem;
      color: #f08080;
      line-height: 1.5;
    }

    .idle {
      font-size: 0.875rem;
      color: #555;
    }

    .suggestion-btn {
      background: #3b2a5a;
      color: #c9b8f0;
      border: 1px solid #5a3e8a;
      border-radius: 4px;
      padding: 3px 10px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .suggestion-btn:hover:not(:disabled) { background: #4e3a78; }
    .suggestion-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .ai-suggestion-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .ai-suggestion-input {
      background: #0f3333;
      color: #7dd4d4;
      border: 1px solid #1a5c5c;
      border-radius: 4px;
      padding: 3px 10px;
      font-size: 0.85rem;
      font-family: inherit;
      flex: 1;
      min-width: 0;
    }
    .ai-suggestion-input:focus {
      outline: none;
      border-color: #2a8a8a;
    }

    .ai-suggestion-add {
      background: #1a5c5c;
      color: #7dd4d4;
      border: 1px solid #2a8a8a;
      border-radius: 4px;
      padding: 3px 12px;
      font-size: 0.85rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .ai-suggestion-add:hover:not(:disabled) { background: #236060; }
    .ai-suggestion-add:disabled { opacity: 0.4; cursor: not-allowed; }

    .thumbnail-wrap {
      margin-bottom: 20px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      overflow: hidden;
      width: 100%;
      aspect-ratio: 16/9;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .thumbnail-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .thumbnail-placeholder {
      color: #444;
      font-size: 0.8rem;
      font-style: italic;
    }

    .saved-msg {
      font-size: 0.85rem;
      color: #5db87a;
      font-weight: 500;
    }

    .add-keyword-wrap {
      margin-top: 16px;
      position: relative;
    }

    .add-keyword-input {
      width: 100%;
      background: #2a2a2a;
      color: #e8e8e8;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 0.875rem;
      font-family: inherit;
    }
    .add-keyword-input:focus {
      outline: none;
      border-color: #3a7bd5;
    }

    .autocomplete-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #2e2e2e;
      border: 1px solid #444;
      border-top: none;
      border-radius: 0 0 6px 6px;
      max-height: 180px;
      overflow-y: auto;
      z-index: 50;
      display: none;
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .autocomplete-list.open { display: block; }

    .autocomplete-item {
      padding: 7px 12px;
      font-size: 0.875rem;
      color: #d0d0d0;
      cursor: pointer;
    }
    .autocomplete-item:hover,
    .autocomplete-item.active {
      background: #3a3a3a;
      color: #e8e8e8;
    }

    /* Modal */
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    #modal.open { display: flex; }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
    }

    .modal-card {
      position: relative;
      background: #2e2e2e;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 28px 28px 24px;
      width: 100%;
      max-width: 340px;
      z-index: 1;
    }

    .modal-card p {
      margin: 0 0 20px;
      font-size: 0.95rem;
      color: #d0d0d0;
      line-height: 1.5;
    }

    .modal-card strong {
      color: #e8e8e8;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .modal-actions button {
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    #modal-cancel {
      background: #3a3a3a;
      color: #ccc;
    }

    #modal-cancel:hover { background: #444; }

    #modal-confirm {
      background: #9b2020;
      color: #fff;
    }

    #modal-confirm:hover { background: #7e1a1a; }
  </style>
</head>
<body tabindex="-1">
  <div class="layout-row">
  <div class="clip-panel">
  <div id="filmstrip"></div>
  <div class="card">
    <h1>Clip Keywords</h1>

    <div class="btn-row">
      <button id="refresh-btn" onclick="refresh()">
        <span class="spinner" id="spinner"></span>
        <span id="btn-label">Refresh</span>
      </button>

      <button id="save-btn" onclick="save()">
        <span class="spinner" id="save-spinner"></span>
        <span id="save-label">Save</span>
      </button>

      <button id="prev-btn" onclick="navigate('prev')" style="display:none">&#8592; Prev</button>
      <button id="next-btn" onclick="navigate('next')" style="display:none">Next &#8594;</button>

      <span id="saved-msg" class="saved-msg" style="display:none">Saved</span>
      <span id="nav-msg" class="saved-msg" style="display:none;color:#f08080"></span>
    </div>

    <div id="status-area">
      <p class="idle">Click Refresh to load the currently selected clip.</p>
    </div>
    <div id="ai-suggestion-section" style="display:none;margin-top:16px">
      <div class="label">AI Suggested <span class="spinner" id="ai-spinner"></span></div>
      <div id="ai-suggestion-container"></div>
    </div>
  </div>
  </div><!-- /.clip-panel -->

  <!-- Identity panel -->
  <div id="identity-panel">
    <h2>Detected Identities <span class="spinner" id="identity-spinner"></span></h2>
    <div id="identity-cards"></div>
    <p id="identity-none" style="display:none">No faces detected in this clip.</p>
    <button id="identity-apply-btn">Apply identities to keywords</button>
  </div>

  </div><!-- /.layout-row -->

  <!-- Inline confirmation modal -->
  <div id="modal" role="dialog" aria-modal="true">
    <div class="modal-backdrop" onclick="closeModal()"></div>
    <div class="modal-card">
      <p>Remove <strong id="modal-kw-name"></strong>?</p>
      <div class="modal-actions">
        <button id="modal-cancel" onclick="closeModal()">Cancel</button>
        <button id="modal-confirm" onclick="confirmRemove()">Remove</button>
      </div>
    </div>
  </div>

  <script>
    let currentKeywords = [];
    let pendingRemoval = null;

    function renderClip(data) {
      const area = document.getElementById('status-area');
      currentKeywords = data.keywords.slice();
      // Reset AI suggestion section (lives outside status-area, persists across renders)
      const aiSection = document.getElementById('ai-suggestion-section');
      const aiContainer = document.getElementById('ai-suggestion-container');
      if (aiSection) aiSection.style.display = 'none';
      if (aiContainer) aiContainer.innerHTML = '';
      // Reset filmstrip
      const filmstrip = document.getElementById('filmstrip');
      if (filmstrip) { filmstrip.innerHTML = ''; filmstrip.style.display = 'none'; }
      // Reset identity panel
      _resetIdentityPanel();
      area.innerHTML = `
        <div class="thumbnail-wrap">
          <img id="clip-thumbnail" alt="Clip thumbnail" style="display:none">
          <span id="thumb-placeholder" class="thumbnail-placeholder">No thumbnail available</span>
        </div>
        <div class="label">Clip</div>
        <div class="clip-name">${escapeHtml(data.clip)}</div>
        <div class="label">Keywords</div>
        <div id="kw-container"></div>
        <div id="suggestions-section" style="display:none;margin-top:16px">
          <div class="label">Suggested</div>
          <div id="suggestions-container"></div>
        </div>
        <div style="margin-top:16px">
          <div class="label">Add keyword</div>
          <div class="add-keyword-wrap">
            <input type="text" id="kw-input" class="add-keyword-input"
                   placeholder="Type a keyword and press Enter…" autocomplete="off">
            <ul id="autocomplete-list" class="autocomplete-list" role="listbox"></ul>
          </div>
        </div>
      `;
      renderKeywords();
      if (data.unsorted) showSave();
      loadThumbnail(data.file_path || null, data.no_proxy || false);
      if (data.suggestions !== undefined) {
        renderSuggestions(data.suggestions);
      } else {
        loadSuggestions();
      }
      if (!data.no_proxy && data.file_path) {
        loadFilmstrip(data.file_path);
        loadAiSuggestion(data.file_path, data.suggestions || []);
        loadIdentities(data.file_path);
      }
      initKeywordInput();
      document.getElementById('prev-btn').style.display = 'inline-flex';
      document.getElementById('next-btn').style.display = 'inline-flex';
      document.body.focus();
    }

    async function refresh() {
      const btn = document.getElementById('refresh-btn');
      const spinner = document.getElementById('spinner');
      const label = document.getElementById('btn-label');
      const area = document.getElementById('status-area');

      btn.disabled = true;
      spinner.style.display = 'block';
      label.textContent = 'Loading…';
      area.innerHTML = '';
      hideSave();

      try {
        const res = await fetch('/api/clip');
        const data = await res.json();

        if (!res.ok) {
          area.innerHTML = `<div class="error-box">${escapeHtml(data.error || 'Unknown error')}</div>`;
          return;
        }

        renderClip(data);
      } catch (err) {
        area.innerHTML = `<div class="error-box">Could not reach the server. Is it running?</div>`;
      } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
        label.textContent = 'Refresh';
      }
    }

    async function navigate(direction) {
      const prevBtn = document.getElementById('prev-btn');
      const nextBtn = document.getElementById('next-btn');
      const refreshBtn = document.getElementById('refresh-btn');
      const navMsg = document.getElementById('nav-msg');

      prevBtn.disabled = true;
      nextBtn.disabled = true;
      refreshBtn.disabled = true;
      navMsg.style.display = 'none';
      hideSave();

      try {
        const res = await fetch('/api/clip/navigate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ direction }),
        });
        const data = await res.json();

        if (res.status === 404) {
          navMsg.textContent = 'No more clips';
          navMsg.style.display = 'inline';
          setTimeout(() => { navMsg.style.display = 'none'; }, 2000);
          return;
        }

        if (!res.ok) {
          const area = document.getElementById('status-area');
          area.innerHTML = `<div class="error-box">${escapeHtml(data.error || 'Unknown error')}</div>`;
          return;
        }

        renderClip(data);
      } catch (err) {
        const area = document.getElementById('status-area');
        area.innerHTML = `<div class="error-box">Could not reach the server. Is it running?</div>`;
      } finally {
        prevBtn.disabled = false;
        nextBtn.disabled = false;
        refreshBtn.disabled = false;
      }
    }

    function renderKeywords() {
      const container = document.getElementById('kw-container');
      if (!container) return;

      if (currentKeywords.length === 0) {
        container.innerHTML = `<p class="no-keywords">(none)</p>`;
        return;
      }

      const ul = document.createElement('ul');
      ul.className = 'keyword-list';
      currentKeywords.forEach(k => {
        const li = document.createElement('li');
        li.textContent = k;
        const btn = document.createElement('button');
        btn.className = 'kw-remove';
        btn.title = 'Remove keyword';
        btn.textContent = '×';
        btn.addEventListener('click', () => askRemove(k));
        li.appendChild(btn);
        ul.appendChild(li);
      });
      container.innerHTML = '';
      container.appendChild(ul);
    }

    function askRemove(keyword) {
      pendingRemoval = keyword;
      document.getElementById('modal-kw-name').textContent = keyword;
      document.getElementById('modal').classList.add('open');
    }

    function closeModal() {
      pendingRemoval = null;
      document.getElementById('modal').classList.remove('open');
    }

    function confirmRemove() {
      if (pendingRemoval !== null) {
        currentKeywords = currentKeywords.filter(k => k !== pendingRemoval);
        renderKeywords();
        showSave();
      }
      closeModal();
    }

    async function save() {
      const btn = document.getElementById('save-btn');
      const spinner = document.getElementById('save-spinner');
      const label = document.getElementById('save-label');
      const savedMsg = document.getElementById('saved-msg');

      btn.disabled = true;
      spinner.style.display = 'block';
      label.textContent = 'Saving…';
      savedMsg.style.display = 'none';

      const area = document.getElementById('status-area');
      const existingError = area.querySelector('.save-error');
      if (existingError) existingError.remove();

      try {
        const res = await fetch('/api/clip/keywords', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ keywords: currentKeywords }),
        });
        const data = await res.json();

        if (!res.ok) {
          const err = document.createElement('div');
          err.className = 'error-box save-error';
          err.style.marginTop = '12px';
          err.textContent = data.error || 'Unknown error';
          area.appendChild(err);
          return;
        }

        hideSave();
        savedMsg.style.display = 'inline';
        setTimeout(() => { savedMsg.style.display = 'none'; }, 2000);
        // Invalidate catalog so it's re-fetched fresh after the background rebuild.
        _catalog = null;
      } catch (err) {
        const errEl = document.createElement('div');
        errEl.className = 'error-box save-error';
        errEl.style.marginTop = '12px';
        errEl.textContent = 'Could not reach the server. Is it running?';
        area.appendChild(errEl);
      } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
        label.textContent = 'Save';
      }
    }

    function showSave() {
      document.getElementById('save-btn').style.display = 'inline-flex';
    }

    function hideSave() {
      document.getElementById('save-btn').style.display = 'none';
      document.getElementById('saved-msg').style.display = 'none';
    }

    async function loadThumbnail(filePath, noProxy) {
      const img = document.getElementById('clip-thumbnail');
      const placeholder = document.getElementById('thumb-placeholder');
      if (!img || !placeholder) return;

      if (noProxy) {
        placeholder.textContent = 'No proxy available';
        return;
      }

      try {
        const url = filePath
          ? '/api/clip/thumbnail?path=' + encodeURIComponent(filePath)
          : '/api/clip/thumbnail';
        const res = await fetch(url);
        if (!res.ok) return; // placeholder stays visible
        const blob = await res.blob();
        img.src = URL.createObjectURL(blob);
        img.style.display = 'block';
        placeholder.style.display = 'none';
      } catch (_) {
        // placeholder stays visible
      }
    }

    function renderSuggestions(suggestions) {
      const section = document.getElementById('suggestions-section');
      const container = document.getElementById('suggestions-container');
      if (!section || !container || !suggestions || suggestions.length === 0) return;

      const row = document.createElement('div');
      row.style.cssText = 'display:flex;flex-wrap:wrap;gap:8px';
      suggestions.forEach(kw => {
        const btn = document.createElement('button');
        btn.className = 'suggestion-btn';
        btn.textContent = '+ ' + kw;
        btn.addEventListener('click', () => addSuggestion(kw, btn));
        row.appendChild(btn);
      });
      container.appendChild(row);
      section.style.display = 'block';
    }

    async function loadSuggestions() {
      try {
        const res = await fetch('/api/clip/suggestions');
        if (!res.ok) return;
        const data = await res.json();
        renderSuggestions(data.suggestions);
      } catch (_) {
        // suggestions are best-effort — fail silently
      }
    }

    function renderAiSuggestions(suggestions) {
      const section = document.getElementById('ai-suggestion-section');
      const container = document.getElementById('ai-suggestion-container');
      if (!section || !container || !suggestions || suggestions.length === 0) return;

      suggestions.forEach(suggestion => {
        const row = document.createElement('div');
        row.className = 'ai-suggestion-row';
        row.style.marginBottom = '6px';

        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'ai-suggestion-input';
        input.value = suggestion;

        const addBtn = document.createElement('button');
        addBtn.className = 'ai-suggestion-add';
        addBtn.textContent = '+ Add';
        addBtn.addEventListener('click', () => {
          const kw = input.value.trim();
          if (kw) addSuggestion(kw, addBtn);
        });
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') addBtn.click();
        });

        row.appendChild(input);
        row.appendChild(addBtn);
        container.appendChild(row);
      });
      section.style.display = 'block';
    }

    function loadFilmstrip(filePath) {
      const strip = document.getElementById('filmstrip');
      if (!strip || !filePath) return;
      strip.style.display = 'flex';
      const FRAME_COUNT = 5;
      // Fire all 5 fetches concurrently; each appends its frame as it arrives.
      for (let i = 0; i < FRAME_COUNT; i++) {
        const url = '/api/clip/filmstrip-frame?' + new URLSearchParams({ path: filePath, index: i });
        const wrap = document.createElement('div');
        wrap.className = 'filmstrip-frame-wrap';
        const placeholder = document.createElement('div');
        placeholder.style.cssText = 'width:160px;height:90px;background:#222;border-radius:2px;';
        wrap.appendChild(placeholder);
        strip.appendChild(wrap);
        fetch(url).then(res => {
          if (!res.ok) { wrap.remove(); return; }
          return res.blob();
        }).then(blob => {
          if (!blob) return;
          const img = document.createElement('img');
          img.className = 'filmstrip-frame';
          img.alt = 'Frame ' + (i + 1);
          img.src = URL.createObjectURL(blob);
          placeholder.replaceWith(img);
        }).catch(() => wrap.remove());
      }
    }

    async function loadAiSuggestion(filePath, proximitySuggestions = []) {
      const aiSpinner = document.getElementById('ai-spinner');
      const aiSection = document.getElementById('ai-suggestion-section');
      if (aiSection) aiSection.style.display = 'block';
      if (aiSpinner) aiSpinner.style.display = 'inline-block';
      try {
        let url = '/api/clip/ai-suggestion';
        if (filePath) {
          const params = new URLSearchParams({ path: filePath });
          if (currentKeywords.length) params.set('keywords', currentKeywords.join(','));
          if (proximitySuggestions.length) params.set('suggestions', proximitySuggestions.join(','));
          url += '?' + params.toString();
        }
        const res = await fetch(url);
        if (!res.ok) return;
        const data = await res.json();
        renderAiSuggestions(data.suggestions);
      } catch (_) {
        // best-effort — fail silently
      } finally {
        if (aiSpinner) aiSpinner.style.display = 'none';
        const container = document.getElementById('ai-suggestion-container');
        if (aiSection && container && container.children.length === 0) {
          aiSection.style.display = 'none';
        }
      }
    }

    function addSuggestion(kw, btn) {
      if (currentKeywords.map(k => k.toLowerCase()).includes(kw.toLowerCase())) return;
      currentKeywords.push(kw);
      renderKeywords();
      showSave();
      btn.disabled = true;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Keyword input + autocomplete ──────────────────────────────────────────

    let _catalog = null; // null = not yet loaded with data

    async function _loadCatalog() {
      if (_catalog !== null && _catalog.length > 0) return;
      try {
        const res = await fetch('/api/keywords/catalog');
        if (!res.ok) return;
        const data = await res.json();
        if (data.keywords && data.keywords.length > 0) {
          _catalog = data.keywords;
        }
        // If empty, leave _catalog as null so the next input event retries.
      } catch (_) { /* leave null, will retry */ }
    }

    function initKeywordInput() {
      const input = document.getElementById('kw-input');
      const list = document.getElementById('autocomplete-list');
      if (!input || !list) return;

      let activeIndex = -1;

      _loadCatalog(); // kick off catalog load in background

      function getMatches(query) {
        if (!query || !_catalog) return [];
        const q = query.toLowerCase();
        const existingLower = currentKeywords.map(k => k.toLowerCase());
        return _catalog
          .filter(k => k.toLowerCase().includes(q) && !existingLower.includes(k.toLowerCase()))
          .slice(0, 8);
      }

      function renderList(matches) {
        list.innerHTML = '';
        if (matches.length === 0) { list.classList.remove('open'); activeIndex = -1; return; }
        matches.forEach((kw, i) => {
          const li = document.createElement('li');
          li.className = 'autocomplete-item';
          li.setAttribute('role', 'option');
          li.textContent = kw;
          li.addEventListener('mousedown', (e) => {
            e.preventDefault(); // keep input focused
            commitKeyword(kw);
          });
          list.appendChild(li);
        });
        activeIndex = 0;
        list.querySelectorAll('.autocomplete-item')[0].classList.add('active');
        list.classList.add('open');
      }

      function closeList() {
        list.classList.remove('open');
        list.innerHTML = '';
        activeIndex = -1;
      }

      function commitKeyword(kw) {
        const trimmed = kw.trim();
        if (!trimmed) return;
        addSuggestion(trimmed, { disabled: false }); // reuse existing flow; dummy btn obj
        input.value = '';
        closeList();
      }

      input.addEventListener('input', () => {
        if (!_catalog || _catalog.length === 0) _loadCatalog();
        renderList(getMatches(input.value));
      });

      input.addEventListener('keydown', (e) => {
        const items = list.querySelectorAll('.autocomplete-item');
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          activeIndex = Math.min(activeIndex + 1, items.length - 1);
          items.forEach((el, i) => el.classList.toggle('active', i === activeIndex));
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          activeIndex = Math.max(activeIndex - 1, -1);
          items.forEach((el, i) => el.classList.toggle('active', i === activeIndex));
        } else if (e.key === 'Enter') {
          e.preventDefault();
          if (activeIndex >= 0 && items[activeIndex]) {
            commitKeyword(items[activeIndex].textContent);
          } else {
            commitKeyword(input.value);
          }
        } else if (e.key === 'Escape') {
          closeList();
        }
      });

      input.addEventListener('blur', () => {
        // Delay so mousedown on list items fires first.
        setTimeout(closeList, 150);
      });

      input.addEventListener('focus', () => {
        if (input.value) renderList(getMatches(input.value));
      });
    }

    // ── Identity recognition ──────────────────────────────────────────────────

    let _identityRegistry = [];  // cached from GET /api/identities

    function _resetIdentityPanel() {
      const panel = document.getElementById('identity-panel');
      const cards = document.getElementById('identity-cards');
      const none  = document.getElementById('identity-none');
      const apply = document.getElementById('identity-apply-btn');
      const spinner = document.getElementById('identity-spinner');
      if (panel)   panel.style.display = 'none';
      if (cards)   cards.innerHTML = '';
      if (none)    none.style.display = 'none';
      if (apply) { apply.style.display = 'none'; apply.disabled = false; apply.textContent = 'Apply identities to keywords'; }
      if (spinner) spinner.style.display = 'none';
    }

    async function loadIdentities(filePath) {
      const panel   = document.getElementById('identity-panel');
      const spinner = document.getElementById('identity-spinner');
      if (!panel) return;

      panel.style.display = 'block';
      if (spinner) spinner.style.display = 'inline-block';

      // Pre-fetch the identity registry for the assign datalist
      try {
        const regRes = await fetch('/api/identities');
        if (regRes.ok) {
          const regData = await regRes.json();
          _identityRegistry = regData.identities || [];
        }
      } catch (_) {}

      try {
        const res = await fetch('/api/clip/detect-identities', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: filePath }),
        });
        if (!res.ok) return;
        const data = await res.json();
        renderIdentityCards(data.detections || []);
      } catch (_) {
        // best-effort — fail silently, panel stays hidden
        panel.style.display = 'none';
      } finally {
        if (spinner) spinner.style.display = 'none';
      }
    }

    // Build a single-detection identity card (used for ungrouped / split cards).
    function _buildSingleIdentityCard(det, datalistId, inheritedName) {
      const card = document.createElement('div');
      card.className = 'identity-card';
      card.dataset.faceTokens = det.face_token;
      card.dataset.identityId = det.identity_id || '';
      card.dataset.isNew = det.identity_id ? 'false' : 'true';

      // Single face crop
      const faceStrip = document.createElement('div');
      faceStrip.className = 'identity-card-faces';
      const img = document.createElement('img');
      img.className = 'identity-card-face';
      img.alt = 'Face';
      img.src = '/api/clip/face-crop?token=' + encodeURIComponent(det.face_token);
      img.onerror = function() {
        const ph = document.createElement('div');
        ph.className = 'identity-card-face-placeholder';
        ph.textContent = '👤';
        this.replaceWith(ph);
      };
      faceStrip.appendChild(img);
      card.appendChild(faceStrip);

      // Status badge
      const badge = document.createElement('span');
      badge.className = 'identity-status ' + (
        det.status === 'known' ? 'known' :
        det.status === 'low_confidence' ? 'low' : 'unknown'
      );
      badge.textContent = det.status === 'low_confidence' ? 'low confidence' : det.status;
      card.appendChild(badge);

      // Assign input
      const assignWrap = document.createElement('div');
      assignWrap.className = 'identity-assign-wrap';
      const assignInput = document.createElement('input');
      assignInput.type = 'text';
      assignInput.className = 'identity-assign-input';
      assignInput.placeholder = 'Who is this?';
      assignInput.setAttribute('list', datalistId);
      // Prefer inherited name (from the group at split time), then the detection's own name.
      assignInput.value = inheritedName || det.display_name || '';
      assignInput.addEventListener('input', () => {
        const match = _identityRegistry.find(
          id => id.display_name.toLowerCase() === assignInput.value.trim().toLowerCase()
        );
        if (match) {
          card.dataset.identityId = match.identity_id;
          card.dataset.isNew = 'false';
        } else {
          card.dataset.identityId = '';
          card.dataset.isNew = 'true';
        }
        const applyBtn = document.getElementById('identity-apply-btn');
        if (applyBtn) {
          applyBtn.disabled = false;
          applyBtn.textContent = 'Apply identities to keywords';
        }
      });
      assignWrap.appendChild(assignInput);
      card.appendChild(assignWrap);

      // Add as keyword checkbox
      const kwLabel = document.createElement('label');
      kwLabel.className = 'identity-add-kw';
      const kwCheck = document.createElement('input');
      kwCheck.type = 'checkbox';
      kwCheck.checked = true;
      kwLabel.appendChild(kwCheck);
      kwLabel.appendChild(document.createTextNode('Add as keyword'));
      card.appendChild(kwLabel);

      return card;
    }

    function renderIdentityCards(detections) {
      const panel  = document.getElementById('identity-panel');
      const cards  = document.getElementById('identity-cards');
      const none   = document.getElementById('identity-none');
      const apply  = document.getElementById('identity-apply-btn');
      if (!panel || !cards) return;

      if (detections.length === 0) {
        none.style.display = 'block';
        apply.style.display = 'none';
        return;
      }

      // Build datalist of known names for the assign input
      const datalistId = 'identity-names-list';
      let datalist = document.getElementById(datalistId);
      if (!datalist) {
        datalist = document.createElement('datalist');
        datalist.id = datalistId;
        document.body.appendChild(datalist);
      }
      datalist.innerHTML = '';
      _identityRegistry.forEach(id => {
        const opt = document.createElement('option');
        opt.value = id.display_name;
        datalist.appendChild(opt);
      });

      // Group detections by resolved identity_id; unknowns each get their own group.
      const groups = [];
      const groupById = {};
      detections.forEach(det => {
        const key = det.identity_id || det.face_token;
        if (groupById[key]) {
          groupById[key].detections.push(det);
        } else {
          const g = { key, detections: [det] };
          groupById[key] = g;
          groups.push(g);
        }
      });

      groups.forEach(group => {
        const rep = group.detections[0];

        // Single-detection groups: just use the single card builder directly.
        if (group.detections.length === 1) {
          cards.appendChild(_buildSingleIdentityCard(rep, datalistId, null));
          return;
        }

        // Multi-detection grouped card
        const card = document.createElement('div');
        card.className = 'identity-card';
        card.dataset.faceTokens = group.detections.map(d => d.face_token).join(',');
        card.dataset.identityId = rep.identity_id || '';
        card.dataset.isNew = rep.identity_id ? 'false' : 'true';

        // Split button — only shown when there are multiple detections
        const splitBtn = document.createElement('button');
        splitBtn.className = 'identity-card-split-btn';
        splitBtn.textContent = 'Split';
        splitBtn.title = 'Ungroup — split into individual cards for correction';
        splitBtn.addEventListener('click', () => {
          // Read the current name from the group's input before splitting
          const currentName = card.querySelector('.identity-assign-input')
            ? card.querySelector('.identity-assign-input').value.trim()
            : '';
          const fragment = document.createDocumentFragment();
          group.detections.forEach(det => {
            fragment.appendChild(_buildSingleIdentityCard(det, datalistId, currentName));
          });
          card.replaceWith(fragment);
        });
        card.appendChild(splitBtn);

        // Thumbnail strip
        const faceStrip = document.createElement('div');
        faceStrip.className = 'identity-card-faces';
        group.detections.forEach(det => {
          const img = document.createElement('img');
          img.className = 'identity-card-face';
          img.alt = 'Face';
          img.src = '/api/clip/face-crop?token=' + encodeURIComponent(det.face_token);
          img.onerror = function() {
            const ph = document.createElement('div');
            ph.className = 'identity-card-face-placeholder';
            ph.textContent = '👤';
            this.replaceWith(ph);
          };
          faceStrip.appendChild(img);
        });
        card.appendChild(faceStrip);

        // Status badge (best status across group)
        const bestStatus = group.detections.some(d => d.status === 'known') ? 'known'
          : group.detections.some(d => d.status === 'low_confidence') ? 'low_confidence'
          : 'unknown';
        const badge = document.createElement('span');
        badge.className = 'identity-status ' + (
          bestStatus === 'known' ? 'known' :
          bestStatus === 'low_confidence' ? 'low' : 'unknown'
        );
        badge.textContent = bestStatus === 'low_confidence' ? 'low confidence' : bestStatus;
        card.appendChild(badge);

        // Assign input
        const assignWrap = document.createElement('div');
        assignWrap.className = 'identity-assign-wrap';
        const assignInput = document.createElement('input');
        assignInput.type = 'text';
        assignInput.className = 'identity-assign-input';
        assignInput.placeholder = 'Who is this?';
        assignInput.setAttribute('list', datalistId);
        if (rep.display_name) assignInput.value = rep.display_name;
        assignInput.addEventListener('input', () => {
          const match = _identityRegistry.find(
            id => id.display_name.toLowerCase() === assignInput.value.trim().toLowerCase()
          );
          if (match) {
            card.dataset.identityId = match.identity_id;
            card.dataset.isNew = 'false';
          } else {
            card.dataset.identityId = '';
            card.dataset.isNew = 'true';
          }
          const applyBtn = document.getElementById('identity-apply-btn');
          if (applyBtn) {
            applyBtn.disabled = false;
            applyBtn.textContent = 'Apply identities to keywords';
          }
        });
        assignWrap.appendChild(assignInput);
        card.appendChild(assignWrap);

        // Add as keyword checkbox
        const kwLabel = document.createElement('label');
        kwLabel.className = 'identity-add-kw';
        const kwCheck = document.createElement('input');
        kwCheck.type = 'checkbox';
        kwCheck.checked = true;
        kwLabel.appendChild(kwCheck);
        kwLabel.appendChild(document.createTextNode('Add as keyword'));
        card.appendChild(kwLabel);

        cards.appendChild(card);
      });

      apply.style.display = 'block';
      apply.onclick = applyIdentities;
    }

    async function applyIdentities() {
      const applyBtn = document.getElementById('identity-apply-btn');
      if (!applyBtn || applyBtn.disabled) return;
      const cards = document.querySelectorAll('.identity-card');
      if (!cards.length) return;

      const assignments = [];
      cards.forEach(card => {
        const input = card.querySelector('.identity-assign-input');
        const checkbox = card.querySelector('input[type="checkbox"]');
        const displayName = input ? input.value.trim() : '';
        if (!displayName) return;

        // Send one assignment per card; use the first token as the representative.
        const primaryToken = (card.dataset.faceTokens || '').split(',')[0];
        assignments.push({
          face_token: primaryToken,
          display_name: displayName,
          keyword_string: displayName,
          identity_id: card.dataset.identityId || null,
          is_new_identity: card.dataset.isNew === 'true',
          add_as_keyword: checkbox ? checkbox.checked : true,
        });
      });

      if (!assignments.length) return;

      applyBtn.disabled = true;
      applyBtn.textContent = 'Applying…';

      try {
        const res = await fetch('/api/identities/confirm', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ assignments }),
        });
        if (!res.ok) return;
        const data = await res.json();

        const added = (data.keywords_added || []).filter(
          kw => !currentKeywords.map(k => k.toLowerCase()).includes(kw.toLowerCase())
        );
        if (added.length) {
          currentKeywords.push(...added);
          renderKeywords();
          showSave();
        }

        applyBtn.textContent = 'Applied ✓';
        applyBtn.disabled = true;

        // Update status badges to "known" for all cards that had a name assigned
        document.querySelectorAll('.identity-card').forEach(card => {
          const input = card.querySelector('.identity-assign-input');
          if (!input || !input.value.trim()) return;
          const badge = card.querySelector('.identity-status');
          if (badge) {
            badge.className = 'identity-status known';
            badge.textContent = 'known';
          }
        });
      } catch (_) {
        applyBtn.disabled = false;
        applyBtn.textContent = 'Apply identities to keywords';
      }
    }

    // ── Global keyboard shortcuts ─────────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      // Ignore when focus is inside a text input or textarea.
      const tag = document.activeElement && document.activeElement.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA') return;

      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        navigate('prev');
      } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        e.preventDefault();
        navigate('next');
      } else if (e.key === 's' || e.key === 'S') {
        const saveBtn = document.getElementById('save-btn');
        if (saveBtn && saveBtn.style.display !== 'none' && !saveBtn.disabled) {
          save();
        }
      }
    });
  </script>
